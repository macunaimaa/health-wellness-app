services:
  db:
    image: postgres:16-alpine
    container_name: saude-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: health_wellness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./backend/seeds/001_seed_data.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d health_wellness"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
